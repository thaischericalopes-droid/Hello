<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Premium Mobile Fullscreen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent; /* Remove o flash azul ao tocar no celular */
        }

        /* Ajuste crucial para mobile: evita scroll fantasma e se adapta às barras do navegador */
        body {
            height: 100vh;
            height: 100dvh; 
            width: 100vw;
            background: #0f172a;
            display: flex;
            overflow: hidden;
        }

        /* --- CONTAINER PRINCIPAL (ESTILO APP NATIVO) --- */
        .window-mobile-fullscreen {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #1e1b4b;
        }

        /* --- CABEÇALHO COMPACTO --- */
        .chat-header {
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
        }

        .user-info h3 {
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .user-info p {
            color: #10b981;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .user-info p::before {
            content: '';
            width: 6px;
            height: 6px;
            background-color: #10b981;
            border-radius: 50%;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1rem;
        }

        .btn-action:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.95);
        }

        /* --- ÁREA DE MENSAGENS REALISTA --- */
        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #1e1b4b; 
            background-size: cover;
            background-position: center;
            transition: background 0.3s ease;
            /* Scroll suave para iOS */
            -webkit-overflow-scrolling: touch; 
        }

        /* Oculta barra de rolagem padrão para parecer app nativo */
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        /* Balões adaptados para telas estreitas */
        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.sent { justify-content: flex-end; }
        .message-row.received { justify-content: flex-start; }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 85%; /* Aproveita muito mais o espaço lateral no celular */
            font-size: 0.92rem;
            line-height: 1.4;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            word-wrap: break-word;
        }

        .message-row.sent .message-bubble {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-bottom-right-radius: 2px;
        }

        .message-row.received .message-bubble {
            background: rgba(255, 255, 255, 0.12);
            border-bottom-left-radius: 2px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .message-bubble img {
            max-width: 100%;
            max-height: 260px;
            border-radius: 10px;
            margin-top: 4px;
            display: block;
            object-fit: cover;
        }

        /* --- ÁREA DE INPUT DE TOQUE FÁCIL --- */
        .chat-input-area {
            padding: 10px 12px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            z-index: 20;
        }

        .chat-input-area input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 16px;
            border-radius: 24px;
            color: white;
            outline: none;
            font-size: 0.95rem; /* Evita que o iOS dê zoom automático indesejado */
        }

        .chat-input-area input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .chat-input-area input[type="text"]:focus {
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.12);
        }

        .btn-send {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 24px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .btn-send:active {
            background: #2563eb;
        }

        /* --- SELETOR DE EMOJIS ESTILO "BOTTOM SHEET" NO MOBILE --- */
        .emoji-picker {
            display: none;
            position: absolute;
            bottom: 68px;
            left: 12px;
            width: calc(100% - 24px); /* Ocupa a largura quase inteira do celular */
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 18px;
            padding: 14px;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 30;
        }

        .emoji-picker.active {
            display: grid;
        }

        .emoji-picker span {
            font-size: 1.5rem; /* Ícones maiores para facilitar o clique com o polegar */
            cursor: pointer;
            text-align: center;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="window-mobile-fullscreen">
        
        <div class="chat-header">
            <div class="user-profile">
                <div class="avatar">🤖</div>
                <div class="user-info">
                    <h3>Chat Mobile</h3>
                    <p>Online</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-action" id="btnWallpaper" title="Mudar Fundo">🖼️</button>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message-row received">
                <div class="message-bubble">
                    Olá! Interface 100% ajustada para smartphones. Envie textos, fotos ou toque nos emojis sem quebras de tela! 📱✨
                </div>
            </div>
        </div>

        <div class="emoji-picker" id="emojiPicker">
            <span>😀</span><span>😃</span><span>😄</span><span>😁</span><span>😆</span><span>😅</span>
            <span>😂</span><span>🤣</span><span>😊</span><span>😍</span><span>🥰</span><span>😘</span>
            <span>😜</span><span>😎</span><span>👍</span><span>🔥</span><span>❤️</span><span>✨</span>
        </div>

        <div class="chat-input-area">
            <button class="btn-action" id="btnEmoji">😊</button>
            
            <button class="btn-action" id="btnFile" title="Foto">📷</button>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">

            <input type="text" id="messageInput" placeholder="Mensagem..." autocomplete="off">
            
            <button class="btn-send" id="btnSend">Enviar</button>
        </div>

    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const btnSend = document.getElementById('btnSend');
        const btnEmoji = document.getElementById('btnEmoji');
        const emojiPicker = document.getElementById('emojiPicker');
        const btnWallpaper = document.getElementById('btnWallpaper');
        const btnFile = document.getElementById('btnFile');
        const fileInput = document.getElementById('fileInput');

        const wallpapers = [
            'linear-gradient(135deg, #1e1b4b 0%, #311042 100%)',
            'linear-gradient(135deg, #0f172a 0%, #0284c7 100%)',
            '#111827',
            'linear-gradient(to top, #09203f 0%, #537895 100%)',
            '#16a34a'
        ];
        let currentWallpaperIdx = 0;

        btnWallpaper.addEventListener('click', () => {
            currentWallpaperIdx = (currentWallpaperIdx + 1) % wallpapers.length;
            chatMessages.style.background = wallpapers[currentWallpaperIdx];
        });

        btnEmoji.addEventListener('click', (e) => {
            e.stopPropagation();
            emojiPicker.classList.toggle('active');
        });

        emojiPicker.querySelectorAll('span').forEach(emoji => {
            emoji.addEventListener('click', () => {
                messageInput.value += emoji.innerText;
                messageInput.focus();
            });
        });

        document.addEventListener('click', () => {
            emojiPicker.classList.remove('active');
        });
        emojiPicker.addEventListener('click', (e) => e.stopPropagation());

        function appendMessage(content, type, isImage = false) {
            const row = document.createElement('div');
            row.classList.add('message-row', type);

            const bubble = document.createElement('div');
            bubble.classList.add('message-bubble');

            if (isImage) {
                const img = document.createElement('img');
                img.src = content;
                img.alt = "Imagem";
                img.onload = () => {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                };
                bubble.appendChild(img);
            } else {
                bubble.innerText = content;
            }

            row.appendChild(bubble);
            chatMessages.appendChild(row);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function handleSend() {
            const text = messageInput.value.trim();
            if (text === '') return;

            appendMessage(text, 'sent');
            messageInput.value = '';
            emojiPicker.classList.remove('active');

            setTimeout(() => {
                appendMessage("Recebido no celular! 📱🚀", 'received');
            }, 1000);
        }

        btnSend.addEventListener('click', handleSend);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        btnFile.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const localImgUrl = URL.createObjectURL(file);
            appendMessage(localImgUrl, 'sent', true);

            setTimeout(() => {
                appendMessage("Foto processada no dispositivo mobile! 📸", 'received');
            }, 1500);

            fileInput.value = '';
        });
    </script>
</body>
</html>
