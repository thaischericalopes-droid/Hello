<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat com Login e Cadastro - Firebase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- TELA DE LOGIN / CADASTRO --- */
        .auth-container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f2f5;
            position: absolute;
            z-index: 20;
        }

        .auth-card {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-card h2 {
            margin-bottom: 25px;
            color: #333;
        }

        .auth-card input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            font-size: 1rem;
        }

        .auth-card input:focus {
            border-color: #007bff;
        }

        .auth-card button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .auth-card button:hover {
            background-color: #0056b3;
        }

        .auth-card p {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }

        .auth-card p span {
            color: #007bff;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- CONTAINER DO CHAT (FULL SCREEN) --- */
        .chat-container {
            width: 100%;
            height: 100vh;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            display: none; /* Escondido por padrão até o login */
        }

        .chat-header {
            background-color: #007bff;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }

        /* --- NOVO: ESTILOS DO MENU --- */
        .menu-wrapper {
            position: relative;
        }

        .menu-toggle-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .menu-toggle-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 130%;
            background-color: white;
            min-width: 220px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            padding: 10px;
            z-index: 100;
            flex-direction: column;
            gap: 5px;
        }

        .dropdown-menu.active {
            display: flex;
        }

        .menu-user-info {
            font-size: 0.85rem;
            color: #666;
            padding: 8px;
            border-bottom: 1px solid #eee;
            word-break: break-all;
        }

        .menu-item {
            background: none;
            border: none;
            text-align: left;
            padding: 10px;
            font-size: 0.95rem;
            color: #333;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .menu-item:hover {
            background-color: #f5f5f5;
        }

        .logout-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            transition: background 0.2s;
            text-align: center;
            margin-top: 5px;
        }

        .logout-btn:hover {
            background-color: #bd2130;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #e5ddd5;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 60%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 1rem;
            line-height: 1.4;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message.sent {
            background-color: #d9fdd3;
            align-self: flex-end;
            border-top-right-radius: 0;
        }

        .message.received {
            background-color: #ffffff;
            align-self: flex-start;
            border-top-left-radius: 0;
        }

        .chat-input-area {
            display: flex;
            padding: 15px 20px;
            background-color: #f0f0f0;
            border-top: 1px solid #ddd;
            align-items: center;
        }

        /* --- NOVO: ESTILOS DO EMOJI PICKER --- */
        .emoji-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .emoji-toggle-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0 12px 0 0;
            transition: transform 0.1s;
        }

        .emoji-toggle-btn:hover {
            transform: scale(1.15);
        }

        .emoji-picker {
            display: none;
            position: absolute;
            bottom: 150%;
            left: 0;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            padding: 10px;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            width: 260px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 100;
        }

        .emoji-picker.active {
            display: grid;
        }

        .emoji-picker span {
            font-size: 1.3rem;
            cursor: pointer;
            text-align: center;
            user-select: none;
            transition: transform 0.1s;
        }

        .emoji-picker span:hover {
            transform: scale(1.25);
        }

        .chat-input-area input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid #ccc;
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
            transition: border 0.2s;
        }

        .chat-input-area input:focus {
            border-color: #007bff;
        }

        .chat-input-area button.send-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 14px 25px;
            margin-left: 12px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .chat-input-area button.send-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="auth-container" id="authContainer">
        <div class="auth-card">
            <h2 id="authTitle">Fazer Login</h2>
            <input type="email" id="authEmail" placeholder="Seu e-mail" required>
            <input type="password" id="authPassword" placeholder="Sua senha (mín. 6 caracteres)" required>
            <button id="authSubmitBtn">Entrar</button>
            <p id="authToggleText">Não tem uma conta? <span id="authToggleLink">Cadastre-se</span></p>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <span>Chat Firebase</span>
            
            <div class="menu-wrapper" id="menuWrapper">
                <button class="menu-toggle-btn" id="menuToggleBtn">⋮</button>
                <div class="dropdown-menu" id="dropdownMenu">
                    <div class="menu-user-info" id="menuUserInfo">Carregando usuário...</div>
                    <button class="menu-item" onclick="alert('Funcionalidade de perfil em breve!')">Meu Perfil</button>
                    <button class="menu-item" onclick="alert('Configurações em breve!')">Configurações</button>
                    <button class="logout-btn" id="logoutButton">Sair da Conta</button>
                </div>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            </div>

        <div class="chat-input-area">
            <div class="emoji-wrapper" id="emojiWrapper">
                <button class="emoji-toggle-btn" id="emojiToggleBtn">😊</button>
                <div class="emoji-picker" id="emojiPicker">
                    <span>😀</span><span>😃</span><span>😄</span><span>😁</span><span>😆</span><span>😅</span>
                    <span>😂</span><span>🤣</span><span>😊</span><span>😇</span><span>🙂</span><span>🙃</span>
                    <span>😉</span><span>😌</span><span>😍</span><span>🥰</span><span>😘</span><span>😗</span>
                    <span>😋</span><span>😛</span><span>😝</span><span>😜</span><span>🤪</span><span>😎</span>
                    <span>🥳</span><span>😏</span><span>👍</span><span>👎</span><span>👏</span><span>🙌</span>
                    <span>❤️</span><span>💔</span><span>🔥</span><span>✨</span><span>🎉</span><span>🚀</span>
                </div>
            </div>

            <input type="text" id="messageInput" placeholder="Digite uma mensagem..." autocomplete="off">
            <button class="send-btn" id="sendButton">Enviar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWQKWMcD3yHBw18Ss58-UQIb9j3dHeXAU",
            authDomain: "hello-e7d45.firebaseapp.com",
            projectId: "hello-e7d45",
            storageBucket: "hello-e7d45.firebasestorage.app",
            messagingSenderId: "1060294872904",
            appId: "1:1060294872904:web:6dde221970da5340362d7d",
            measurementId: "G-NYZNNHG81T"
        };

        // Inicializações do Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const messagesRef = collection(db, "messages");

        // Variáveis de Controle de Estado
        let mySenderId = null;
        let isSignUpMode = false; 
        let unsubscribeMessages = null; 

        // Elementos DOM da Autenticação
        const authContainer = document.getElementById('authContainer');
        const chatContainer = document.getElementById('chatContainer');
        const authTitle = document.getElementById('authTitle');
        const authEmail = document.getElementById('authEmail');
        const authPassword = document.getElementById('authPassword');
        const authSubmitBtn = document.getElementById('authSubmitBtn');
        const authToggleLink = document.getElementById('authToggleLink');
        const authToggleText = document.getElementById('authToggleText');
        const logoutButton = document.getElementById('logoutButton');

        // Elementos DOM do Chat
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');

        // ELEMENTOS NOVOS (Menu e Emoji)
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        const dropdownMenu = document.getElementById('dropdownMenu');
        const menuUserInfo = document.getElementById('menuUserInfo');
        const emojiToggleBtn = document.getElementById('emojiToggleBtn');
        const emojiPicker = document.getElementById('emojiPicker');

        // --- LÓGICA DE INTERAÇÃO DO MENU ---
        menuToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdownMenu.classList.toggle('active');
            emojiPicker.classList.remove('active'); // Fecha o emoji picker se aberto
        });

        // --- LÓGICA DE INTERAÇÃO DO EMOJI PICKER ---
        emojiToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            emojiPicker.classList.toggle('active');
            dropdownMenu.classList.remove('active'); // Fecha o menu se aberto
        });

        // Inserir emoji no campo de texto ao clicar
        emojiPicker.querySelectorAll('span').forEach(emojiSpan => {
            emojiSpan.addEventListener('click', () => {
                messageInput.value += emojiSpan.innerText;
                messageInput.focus(); // Mantém o foco no input do texto
            });
        });

        // Fechar os menus flutuantes caso o usuário clique fora deles
        document.addEventListener('click', () => {
            dropdownMenu.classList.remove('active');
            emojiPicker.classList.remove('active');
        });

        // Evita fechar os menus ao clicar dentro deles mesmos
        document.getElementById('menuWrapper').addEventListener('click', (e) => e.stopPropagation());
        document.getElementById('emojiWrapper').addEventListener('click', (e) => e.stopPropagation());


        // --- LÓGICA DE ALTERNÂNCIA: LOGIN <=> CADASTRO ---
        authToggleLink.addEventListener('click', () => {
            isSignUpMode = !isSignUpMode;
            if (isSignUpMode) {
                authTitle.innerText = "Criar Conta";
                authSubmitBtn.innerText = "Cadastrar";
                authToggleText.innerHTML = 'Já tem uma conta? <span id="authToggleLink">Faça Login</span>';
            } else {
                authTitle.innerText = "Fazer Login";
                authSubmitBtn.innerText = "Entrar";
                authToggleText.innerHTML = 'Não tem uma conta? <span id="authToggleLink">Cadastre-se</span>';
            }
            document.getElementById('authToggleLink').addEventListener('click', () => authToggleLink.click());
        });

        // --- SUBMIT DE AUTENTICAÇÃO (LOGIN / CADASTRO) ---
        authSubmitBtn.addEventListener('click', async () => {
            const email = authEmail.value.trim();
            const password = authPassword.value;

            if (!email || !password) {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            try {
                if (isSignUpMode) {
                    await createUserWithEmailAndPassword(auth, email, password);
                    alert("Conta criada com sucesso!");
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (error) {
                console.error(error);
                alert("Erro: " + error.message);
            }
        });

        // --- LOGOUT (SAIR DA CONTA) ---
        logoutButton.addEventListener('click', () => {
            signOut(auth);
        });

        // --- MONITOR DE ESTADO DO USUÁRIO ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                mySenderId = user.uid;
                
                // Atualiza o e-mail do usuário dentro do Menu Suspenso
                menuUserInfo.innerText = `Logado como:\n${user.email}`;
                
                authContainer.style.display = 'none';
                chatContainer.style.display = 'flex';
                
                startChatListener();
            } else {
                mySenderId = null;
                authContainer.style.display = 'flex';
                chatContainer.style.display = 'none';
                chatMessages.innerHTML = ''; 
                
                if (unsubscribeMessages) {
                    unsubscribeMessages();
                }
            }
        });

        // --- LÓGICA DE RENDERIZAÇÃO DE MENSAGENS ---
        function appendMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', type);
            messageDiv.innerText = text;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // --- ESCUTAR BANCO DE DADOS EM TEMPO REAL ---
        function startChatListener() {
            const q = query(messagesRef, orderBy("createdAt", "asc"));
            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                chatMessages.innerHTML = ''; 
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const type = data.senderId === mySenderId ? 'sent' : 'received';
                    if (data.text) {
                        appendMessage(data.text, type);
                    }
                });
            });
        }

        // --- ENVIAR MENSAGEM PARA O FIREBASE ---
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (text === '' || !mySenderId) return; 

            try {
                await addDoc(messagesRef, {
                    text: text,
                    senderId: mySenderId, 
                    createdAt: serverTimestamp()
                });
                messageInput.value = ''; 
                emojiPicker.classList.remove('active'); // Opcional: Fecha os emojis ao enviar
            } catch (error) {
                console.error("Erro ao enviar:", error);
            }
        }

        // Eventos de envio do chat
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
