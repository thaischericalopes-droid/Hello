http://localhost:7700/index.html<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Premium Flutuante</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Fundo da página imersivo para destacar a tela flutuante */
        body {
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Detalhes decorativos no fundo para dar efeito de profundidade */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(45deg, #3b82f6, #8b5cf6);
            filter: blur(80px);
            opacity: 0.4;
            z-index: 1;
        }
        body::before { top: 10%; left: 15%; }
        body::after { bottom: 10%; right: 15%; }

        /* --- TELA FLUTUANTE DO CHAT --- */
        .window-floating {
            position: relative;
            z-index: 10;
            width: 400px;
            height: 650px;
            max-width: 95vw;
            max-height: 90vh;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: floatIn 0.6s ease-out;
        }

        @keyframes floatIn {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* --- CABEÇALHO --- */
        .chat-header {
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .user-info h3 {
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .user-info p {
            color: #10b981;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .user-info p::before {
            content: '';
            width: 6px;
            height: 6px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1rem;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* --- ÁREA DE MENSAGENS (COM PAPEL DE PAREDE) --- */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #1e1b4b; /* Padrão Inicial */
            background-size: cover;
            background-position: center;
            transition: background 0.4s ease;
        }

        /* Customização da barra de rolagem */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        /* Balões de Mensagem */
        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.sent { justify-content: flex-end; }
        .message-row.received { justify-content: flex-start; }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            max-width: 80%;
            font-size: 0.9rem;
            line-height: 1.4;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            word-wrap: break-word;
        }

        .message-row.sent .message-bubble {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-bottom-right-radius: 2px;
        }

        .message-row.received .message-bubble {
            background: rgba(255, 255, 255, 0.15);
            border-bottom-left-radius: 2px;
            backdrop-filter: blur(5px);
        }

        /* Exibição de Fotos no Chat */
        .message-bubble img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 4px;
            display: block;
            object-fit: cover;
        }

        /* --- ÁREA DE ENTRADA / INPUT --- */
        .chat-input-area {
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .chat-input-area input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 50px;
            color: white;
            outline: none;
            font-size: 0.9rem;
            transition: border 0.2s;
        }

        .chat-input-area input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .chat-input-area input[type="text"]:focus {
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-send {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-send:hover {
            background: #2563eb;
        }

        /* --- SELETOR DE EMOJIS FLUTUANTE --- */
        .emoji-picker {
            display: none;
            position: absolute;
            bottom: 80px;
            left: 16px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 10px;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            z-index: 30;
            width: 240px;
        }

        .emoji-picker.active {
            display: grid;
        }

        .emoji-picker span {
            font-size: 1.25rem;
            cursor: pointer;
            text-align: center;
            user-select: none;
            transition: transform 0.1s;
        }

        .emoji-picker span:hover {
            transform: scale(1.25);
        }
    </style>
</head>
<body>

    <div class="window-floating">
        
        <div class="chat-header">
            <div class="user-profile">
                <div class="avatar">🤖</div>
                <div class="user-info">
                    <h3>Chat Flutuante</h3>
                    <p>Online</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-action" id="btnWallpaper" title="Mudar Papel de Parede">🖼️</button>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message-row received">
                <div class="message-bubble">
                    Olá! Sou o assistente local. Teste o envio de textos, os emojis 😊 ou adicione fotos do seu aparelho!
                </div>
            </div>
        </div>

        <div class="emoji-picker" id="emojiPicker">
            <span>😀</span><span>😃</span><span>😄</span><span>😁</span><span>😆</span><span>😅</span>
            <span>😂</span><span>🤣</span><span>😊</span><span>😍</span><span>🥰</span><span>😘</span>
            <span>😜</span><span>😎</span><span>👍</span><span>🔥</span><span>❤️</span><span>✨</span>
        </div>

        <div class="chat-input-area">
            <button class="btn-action" id="btnEmoji">😊</button>
            
            <button class="btn-action" id="btnFile" title="Escolher Foto">📷</button>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">

            <input type="text" id="messageInput" placeholder="Digite sua mensagem..." autocomplete="off">
            
            <button class="btn-send" id="btnSend">Enviar</button>
        </div>

    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const btnSend = document.getElementById('btnSend');
        const btnEmoji = document.getElementById('btnEmoji');
        const emojiPicker = document.getElementById('emojiPicker');
        const btnWallpaper = document.getElementById('btnWallpaper');
        const btnFile = document.getElementById('btnFile');
        const fileInput = document.getElementById('fileInput');

        // --- LISTA DE PAPÉIS DE PAREDE ---
        // Mistura de cores sólidas, gradientes e texturas CSS
        const wallpapers = [
            'linear-gradient(135deg, #1e1b4b 0%, #311042 100%)', // Padrão Escuro Roxo
            'linear-gradient(135deg, #0f172a 0%, #0284c7 100%)', // Azul Noturno
            '#111827', // Totalmente Negro Puro
            'linear-gradient(to top, #09203f 0%, #537895 100%)', // Cinza Azulado Elegante
            '#16a34a'  // Verde Estilo App de Mensagens Tradicional
        ];
        let currentWallpaperIdx = 0;

        btnWallpaper.addEventListener('click', () => {
            currentWallpaperIdx = (currentWallpaperIdx + 1) % wallpapers.length;
            chatMessages.style.background = wallpapers[currentWallpaperIdx];
        });

        // --- SISTEMA DE SELEÇÃO DE EMOJIS ---
        btnEmoji.addEventListener('click', (e) => {
            e.stopPropagation();
            emojiPicker.classList.toggle('active');
        });

        emojiPicker.querySelectorAll('span').forEach(emoji => {
            emoji.addEventListener('click', () => {
                messageInput.value += emoji.innerText;
                messageInput.focus();
            });
        });

        // Fecha janelas ao clicar fora
        document.addEventListener('click', () => {
            emojiPicker.classList.remove('active');
        });
        emojiPicker.addEventListener('click', (e) => e.stopPropagation());

        // --- SISTEMA DE RENDERIZAÇÃO DE MENSAGENS ---
        function appendMessage(content, type, isImage = false) {
            const row = document.createElement('div');
            row.classList.add('message-row', type);

            const bubble = document.createElement('div');
            bubble.classList.add('message-bubble');

            if (isImage) {
                const img = document.createElement('img');
                img.src = content;
                img.alt = "Imagem carregada";
                img.onload = () => {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                };
                bubble.appendChild(img);
            } else {
                bubble.innerText = content;
            }

            row.appendChild(bubble);
            chatMessages.appendChild(row);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Enviar Mensagem de Texto
        function handleSend() {
            const text = messageInput.value.trim();
            if (text === '') return;

            appendMessage(text, 'sent');
            messageInput.value = '';
            emojiPicker.classList.remove('active');

            // Simulador de Resposta Automática (Mock Bot)
            setTimeout(() => {
                appendMessage("Mensagem recebida com sucesso na tela flutuante! 🚀", 'received');
            }, 1000);
        }

        btnSend.addEventListener('click', handleSend);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        // --- CARREGAMENTO DE FOTOS LOCAIS ---
        btnFile.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Cria uma URL temporária local para a imagem selecionada pelo usuário
            const localImgUrl = URL.createObjectURL(file);
            
            // Exibe a imagem enviada por você no chat
            appendMessage(localImgUrl, 'sent', true);

            // Resposta automatizada simulando o recebimento da imagem
            setTimeout(() => {
                appendMessage("Que foto legal! Ela foi processada localmente na interface. 📸✨", 'received');
            }, 1500);

            // Limpa o input de arquivo para permitir enviar a mesma imagem de novo se quiser
            fileInput.value = '';
        });
    </script>
</body>
</html>
